<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Candidatos | Manserca</title>
    <!-- Para cambiar a la versión sobria, cambia "style.css" por "style-sober.css" abajo -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fjalla+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">MANSERCA</div>
            <h1>Únete a nuestro equipo</h1>
            <p>Formulario de postulación oficial</p>
        </header>

        <div class="stepper">
            <div class="step active" id="s1">1</div>
            <div class="step-line"></div>
            <div class="step" id="s2">2</div>
            <div class="step-line"></div>
            <div class="step" id="s3">3</div>
        </div>

        <form id="atsForm">
            <!-- SEGURIDAD: Campo invisible para humanos, trampa para bots -->
            <div style="display:none !important;">
                <input type="text" id="website_url" name="website_url" tabindex="-1" autocomplete="off">
            </div>

            <!-- PASO 1: Datos Personales -->
            <section id="step1" class="form-section active">
                <h2>1. Datos Personales</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
                    </div>
                    <div class="input-group">
                        <label>Cédula</label>
                        <div class="cedula-row" style="display: flex; gap: 10px;">
                            <select id="nacionalidad" style="width: 80px;">
                                <option value="V">V</option>
                                <option value="E">E</option>
                            </select>
                            <input type="number" id="cedula" placeholder="Número de cédula" required style="flex: 1;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Teléfono de contacto</label>
                        <input type="tel" id="telefono" placeholder="+58 412 000 0000" required>
                    </div>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn-next" onclick="nextStep(2)">Siguiente</button>
                </div>
            </section>

            <!-- PASO 2: Ubicación y Cargo -->
            <section id="step2" class="form-section">
                <h2>2. Perfil y Ubicación</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Cargo al que aplica</label>
                        <select id="perfil" onchange="loadDynamicQuestions()" required>
                            <option value="">Seleccione un cargo...</option>
                            <option value="Operario de Limpieza">Operario de Limpieza</option>
                            <option value="Chófer">Chófer</option>
                            <option value="Jardinero">Jardinero</option>
                            <option value="Técnico de Limpieza">Técnico de Limpieza</option>
                            <option value="Supervisor de Operaciones">Supervisor de Operaciones</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select id="estado" onchange="loadMunicipalities()" required>
                            <option value="">Seleccione Estado...</option>
                            <option value="Amazonas">Amazonas</option>
                            <option value="Anzoátegui">Anzoátegui</option>
                            <option value="Apure">Apure</option>
                            <option value="Aragua">Aragua</option>
                            <option value="Barinas">Barinas</option>
                            <option value="Bolívar">Bolívar</option>
                            <option value="Carabobo">Carabobo</option>
                            <option value="Cojedes">Cojedes</option>
                            <option value="Delta Amacuro">Delta Amacuro</option>
                            <option value="Distrito Capital">Distrito Capital</option>
                            <option value="Falcón">Falcón</option>
                            <option value="Guárico">Guárico</option>
                            <option value="Lara">Lara</option>
                            <option value="Mérida">Mérida</option>
                            <option value="Miranda">Miranda</option>
                            <option value="Monagas">Monagas</option>
                            <option value="Nueva Esparta">Nueva Esparta</option>
                            <option value="Portuguesa">Portuguesa</option>
                            <option value="Sucre">Sucre</option>
                            <option value="Táchira">Táchira</option>
                            <option value="Trujillo">Trujillo</option>
                            <option value="Vargas (La Guaira)">Vargas (La Guaira)</option>
                            <option value="Yaracuy">Yaracuy</option>
                            <option value="Zulia">Zulia</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Municipio</label>
                        <select id="municipio" required>
                            <option value="">Seleccione Municipio...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Sector / Referencia</label>
                        <input type="text" id="sector" placeholder="Ej: Urbanización Prebo" required>
                    </div>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn-back" onclick="nextStep(1)">Atrás</button>
                    <button type="button" class="btn-next" onclick="nextStep(3)">Siguiente</button>
                </div>
            </section>

            <!-- PASO 3: Preguntas Técnicas -->
            <section id="step3" class="form-section">
                <h2>3. Preguntas de Aptitud</h2>
                <div id="dynamicQuestionsContainer">
                    <!-- Las preguntas se cargan aquí -->
                </div>
                <div class="btn-row">
                    <button type="button" class="btn-back" onclick="nextStep(2)">Atrás</button>
                    <button type="submit" class="btn-submit" id="submitBtn">Enviar Postulación</button>
                </div>
            </section>
        </form>
    </div>
    <script src="preguntas.js"></script>
    <script src="script.js"></script>
</body>
</html>
